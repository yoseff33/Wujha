<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>وُجْهَة | الخريطة التفاعلية</title>

    <!-- ===== Fonts & Icons ===== -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet" />
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />

    <!-- ===== Leaflet CSS ===== -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />

    <!-- ===== ملف CSS الرئيسي ===== -->
    <link rel="stylesheet" href="style.css" />

    <!-- ===== Supabase + Project Files ===== -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <script src="supabase-config.js">
    </script>
    <script src="script.js">
    </script>

    <!-- ===== تم حذف وسم <style> بالكامل ===== -->
</head>
<body>

    <!-- ===== HEADER ===== -->
    <header>
        <div class="container">
            <nav class="navbar">
                <a href="index.html" class="logo">
                    <div class="logo-icon">و</div>
                    <div class="logo-text">وُجْهَة</div>
                </a>
                <ul class="nav-links desktop-nav-links">
                    <li><a href="index.html">الرئيسية</a></li>
                    <li><a href="cars.html">الأسطول</a></li>
                    <li><a href="qassim-map.html" class="active">تصفح الخريطة</a></li>
                    <li><a href="dashboard-owner.html" class="auth-link" id="nav-owner-dashboard">لوحة المؤجر</a></li>
                    <li><a href="dashboard-renter.html" class="auth-link" id="nav-renter-dashboard">لوحة المستأجر</a></li>
                    <li><a href="add-car.html" class="auth-link" id="nav-add-car">أضف سيارتك</a></li>
                </ul>
                <div class="nav-buttons nav-buttons-desktop-only">
                    <button id="theme-toggle-desktop" class="theme-toggle"><i class="fas fa-moon"></i> الوضع</button>
                    <a href="landing.html" class="btn btn-primary guest-only" id="nav-guest-button">دخول</a>
                    <div id="nav-user-profile-placeholder"></div>
                </div>
            </nav>
        </div>
    </header>

    <!-- ===== MAIN SECTION ===== -->
    <section>
        <div class="container">
            <div class="section-title" data-aos="fade-up">
                <h2>استكشف السيارات حولك</h2>
                <p>اختر السيارة، شيك على تقييمها، وانطلق!</p>
            </div>

            <div class="centered-map-layout">
                <!-- filter bar -->
                <div class="top-filter-bar" data-aos="fade-up">
                    <div class="tf-item">
                        <span class="tf-label"><i class="fas fa-map-marker-alt"></i> المدينة</span>
                        <select id="city-selector" class="tf-select">
                            <option value="all">جميع المدن</option>
                            <option value="الرياض">الرياض</option>
                            <option value="جدة">جدة</option>
                            <option value="الدمام">الدمام</option>
                            <option value="الخبر">الخبر</option>
                            <option value="بريدة">بريدة</option>
                        </select>
                    </div>
                    <div class="tf-item">
                        <span class="tf-label"><i class="fas fa-car"></i> الفئة</span>
                        <div class="tf-pills" id="type-pills">
                            <div class="tf-pill active" data-type="الكل">الكل</div>
                            <div class="tf-pill" data-type="sedan">سيدان</div>
                            <div class="tf-pill" data-type="suv">عائلي</div>
                            <div class="tf-pill" data-type="luxury">فاخرة</div>
                        </div>
                    </div>
                    <div class="tf-item">
                        <span class="tf-label"><i class="fas fa-tag"></i> الحد الأقصى: <span id="priceValue">1000</span> ريال</span>
                        <input type="range" min="50" max="1000" value="1000" id="priceSlider" />
                    </div>
                    <button class="tf-btn" id="smart-locate-btn"><i class="fas fa-crosshairs"></i> الأقرب</button>
                </div>

                <!-- map -->
                <div class="new-map-container" data-aos="zoom-in">
                    <div id="mapid"></div>
                    <div id="loading-map-overlay" class="loading-map">
                        <i class="fas fa-spinner fa-spin"></i> جاري تحميل السيارات...
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- ===== MOBILE BOTTOM NAV ===== -->
    <nav class="bottom-navbar mobile-bottom-navbar">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>الرئيسية</span></a>
        <a href="cars.html" class="nav-item"><i class="fas fa-car"></i><span>السيارات</span></a>
        <a href="landing.html" class="nav-item guest-only" id="mobile-bottom-guest-button"><i class="fas fa-sign-in-alt"></i><span>دخول</span></a>
        <a href="#" class="nav-item auth-link-bottom" id="mobile-bottom-user-button"><i class="fas fa-user-circle"></i><span>حسابي</span></a>
        <a href="qassim-map.html" class="nav-item active"><i class="fas fa-map-marked-alt"></i><span>الخريطة</span></a>
    </nav>

    <!-- ===== SCRIPTS ===== -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin="anonymous">
    </script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js">
    </script>

    <script>
        // ===== AOS =====
        AOS.init({ once: true });

        // ===== تحديث شريط التنقل =====
        function updateNavbarLocal() {
            if (typeof updateNavbarBasedOnLoginStatus === 'function') {
                updateNavbarBasedOnLoginStatus();
            }
        }
        updateNavbarLocal();

        // ===== الثيم =====
        (function initTheme() {
            const btn = document.getElementById('theme-toggle-desktop');
            if (localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark-mode');
            }
            if (btn) {
                btn.addEventListener('click', function() {
                    document.body.classList.toggle('dark-mode');
                    localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' :
                        'light');
                });
            }
        })();

        // =====================================================================
        //  الخريطة — استخدام IIFE لعزل المتغيرات ومنع التضارب
        // =====================================================================
        (function() {

            // ---- متغيرات خاصة بالخريطة ----
            let mapInstance = null;
            let carLayerInstance = null;
            let routeLineInstance = null;
            let isMapInitialized = false; // لتجنب إعادة التهيئة

            let currentCars = [];
            const centerPoint = [24.8375090, 46.7297325];
            let currType = 'الكل';
            let maxPrice = 1000;
            let currCity = 'all';

            // ---- عناصر DOM ----
            const citySelect = document.getElementById('city-selector');
            const priceSlider = document.getElementById('priceSlider');
            const priceValueSpan = document.getElementById('priceValue');
            const typePills = document.querySelectorAll('#type-pills .tf-pill');
            const locateBtn = document.getElementById('smart-locate-btn');
            const overlay = document.getElementById('loading-map-overlay');

            // ---- جلب السيارات من Supabase ----
            async function fetchCarsForMap() {
                try {
                    const { data, error } = await window.supabaseClient
                        .from('cars')
                        .select('*')
                        .eq('status', 'active');
                    if (error) throw error;
                    return data || [];
                } catch (err) {
                    console.error('خطأ في جلب السيارات:', err);
                    return [];
                }
            }

            // ---- إنشاء أيقونة السعر ----
            function createPriceIcon(price, type, isPremium) {
                let iconHtml = '<i class="fas fa-car" style="color:#1abc9c"></i>';
                if (type === 'luxury') iconHtml = '<i class="fas fa-gem" style="color:#f1c40f"></i>';
                else if (type === 'suv') iconHtml = '<i class="fas fa-truck-pickup" style="color:#e67e22"></i>';
                return L.divIcon({
                    className: 'custom-none',
                    html: `<div class="price-marker-box ${isPremium ? 'premium' : ''}">${iconHtml} ${price} ﷼</div>`,
                    iconSize: [80, 30],
                    iconAnchor: [40, 35],
                    popupAnchor: [0, -35]
                });
            }

            // ---- عرض السيارات على الخريطة ----
            function renderCars() {
                if (!mapInstance || !carLayerInstance) return;
                carLayerInstance.clearLayers();
                if (routeLineInstance) {
                    mapInstance.removeLayer(routeLineInstance);
                    routeLineInstance = null;
                }

                const filtered = currentCars.filter(car => {
                    const typeMatch = currType === 'الكل' ? true : car.type === currType;
                    const priceMatch = (car.daily_price || 0) <= maxPrice;
                    const cityMatch = currCity === 'all' ? true : car.city === currCity;
                    return typeMatch && priceMatch && cityMatch;
                });

                if (filtered.length === 0) {
                    L.popup()
                        .setLatLng(centerPoint)
                        .setContent('لا توجد سيارات تطابق الفلتر الحالي.')
                        .openOn(mapInstance);
                    return;
                }

                filtered.forEach(car => {
                    const lat = parseFloat(car.lat) || 24.8;
                    const lng = parseFloat(car.lng) || 46.7;
                    const price = car.daily_price || 0;
                    const isPremium = car.rating && car.rating >= 4.8;

                    const marker = L.marker([lat, lng], {
                        icon: createPriceIcon(price, car.type, isPremium)
                    }).addTo(carLayerInstance);

                    marker.on('click', function() {
                        const offsetLat = lat + 0.0025;
                        mapInstance.flyTo([offsetLat, lng], 16, { duration: 1 });
                        if (routeLineInstance) {
                            mapInstance.removeLayer(routeLineInstance);
                            routeLineInstance = null;
                        }
                        routeLineInstance = L.polyline([centerPoint, [lat, lng]], {
                            color: '#34495e',
                            dashArray: '10, 10'
                        }).addTo(mapInstance);
                    });

                    const imgUrl = car.images && car.images.length > 0 ?
                        car.images[0] :
                        'https://via.placeholder.com/300x200?text=سيارة';

                    const content = `
                            <div class="popup-car-card">
                                <img src="${imgUrl}" class="popup-img" alt="${car.brand || ''} ${car.model || ''}" />
                                <div class="popup-header">
                                    <h4>${car.brand || ''} ${car.model || ''}</h4>
                                    <span class="popup-rating">⭐ ${car.rating || 4.5}</span>
                                </div>
                                <div style="margin:5px 0;">
                                    <div class="rating-row">
                                        <span>الميكانيكا</span>
                                        <div class="progress-bar">
                                            <div class="progress-fill" style="width:${(car.rating || 4.5) * 10}%"></div>
                                        </div>
                                    </div>
                                    <div class="rating-row">
                                        <span>النظافة</span>
                                        <div class="progress-bar">
                                            <div class="progress-fill" style="width:${(car.rating || 4.5) * 10}%"></div>
                                        </div>
                                    </div>
                                </div>
                                <a href="cars.html" class="popup-btn">حجز بـ ${price} ريال</a>
                            </div>
                        `;
                    marker.bindPopup(content, {
                        autoPan: true,
                        autoPanPadding: [20, 20],
                        closeButton: true
                    });
                });
            }

            // ---- دوال الفلاتر (معروضة للاستخدام من HTML) ----
            window.updatePriceLabel = function(val) {
                maxPrice = parseInt(val, 10);
                if (priceValueSpan) priceValueSpan.innerText = maxPrice;
                renderCars();
            };

            window.filterMap = function(type, el) {
                currType = type;
                typePills.forEach(p => p.classList.remove('active'));
                if (el) el.classList.add('active');
                renderCars();
            };

            window.changeCity = function() {
                currCity = citySelect ? citySelect.value : 'all';
                renderCars();
            };

            window.simulateSmartLocate = function() {
                if (mapInstance) {
                    mapInstance.flyTo(centerPoint, 16, { duration: 1.2 });
                }
            };

            // ---- ربط الأحداث ----
            if (priceSlider) {
                priceSlider.addEventListener('input', function() {
                    const val = parseInt(this.value, 10);
                    maxPrice = val;
                    if (priceValueSpan) priceValueSpan.innerText = val;
                    renderCars();
                });
                // مزامنة القيمة الابتدائية
                maxPrice = parseInt(priceSlider.value, 10);
                if (priceValueSpan) priceValueSpan.innerText = maxPrice;
            }

            if (citySelect) {
                citySelect.addEventListener('change', function() {
                    currCity = this.value;
                    renderCars();
                });
            }

            typePills.forEach(pill => {
                pill.addEventListener('click', function() {
                    const type = this.dataset.type || 'الكل';
                    typePills.forEach(p => p.classList.remove('active'));
                    this.classList.add('active');
                    currType = type;
                    renderCars();
                });
            });

            if (locateBtn) {
                locateBtn.addEventListener('click', function() {
                    window.simulateSmartLocate();
                });
            }

            // ---- تهيئة الخريطة (مرة واحدة) ----
            async function initMap() {
                // منع إعادة التهيئة
                if (isMapInitialized) {
                    console.warn('الخريطة مهيأة مسبقاً، لن يتم إعادة تهيئتها.');
                    return;
                }

                const mapContainer = document.getElementById('mapid');
                if (!mapContainer) return;

                // التحقق مما إذا كان العنصر يحتوي بالفعل على خريطة (Leaflet يضيف class leaflet-container)
                if (mapContainer.classList.contains('leaflet-container')) {
                    console.warn('العنصر يحتوي بالفعل على خريطة Leaflet.');
                    try {
                        if (mapInstance) {
                            mapInstance.remove();
                            mapInstance = null;
                        }
                        mapContainer.classList.remove('leaflet-container');
                    } catch (e) {
                        console.warn('لا يمكن إزالة الخريطة القديمة، سنستمر في التهيئة الجديدة.');
                    }
                }

                if (overlay) overlay.style.display = 'flex';

                // جلب السيارات
                currentCars = await fetchCarsForMap();

                if (overlay) overlay.style.display = 'none';

                // إنشاء الخريطة
                mapInstance = L.map('mapid', {
                    center: centerPoint,
                    zoom: 14,
                    zoomControl: true,
                    fadeAnimation: true,
                    zoomAnimation: true
                });

                L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                    attribution: '&copy; CARTO',
                    maxZoom: 20
                }).addTo(mapInstance);

                carLayerInstance = L.layerGroup().addTo(mapInstance);
                renderCars();

                setTimeout(() => {
                    if (mapInstance) mapInstance.invalidateSize();
                }, 500);

                mapInstance.on('popupclose', function() {
                    mapInstance.flyTo(centerPoint, 14, { duration: 1 });
                    if (routeLineInstance) {
                        mapInstance.removeLayer(routeLineInstance);
                        routeLineInstance = null;
                    }
                });

                isMapInitialized = true;
            }

            // ---- بدء التشغيل ----
            if (typeof L !== 'undefined') {
                if (document.readyState === 'complete' || document.readyState === 'interactive') {
                    initMap();
                } else {
                    document.addEventListener('DOMContentLoaded', initMap);
                }
            } else {
                console.error('Leaflet لم يتم تحميلها');
            }

        })(); // نهاية IIFE
    </script>
</body>
</html>
