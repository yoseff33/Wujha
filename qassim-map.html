<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وُجْهَة | الخريطة التفاعلية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <link rel="stylesheet" href="style.css">

    <!-- ===== مكتبة Supabase وملفات المشروع ===== -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="script.js"></script>

    <style>
        .centered-map-layout { max-width: 900px; margin: 0 auto; position: relative; }

        .top-filter-bar {
            background: #ffffff; border: 1px solid #e0e0e0; border-radius: 16px;
            padding: 12px 15px; margin-bottom: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03); display: flex;
            align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
        }

        .tf-item { display: flex; flex-direction: column; gap: 4px; min-width: 130px; flex: 1; }
        .tf-label { font-size: 0.8rem; font-weight: bold; color: #666; display: flex; align-items: center; gap: 5px; }
        .tf-pills { display: flex; gap: 4px; background: #f5f5f5; padding: 3px; border-radius: 50px; width: fit-content; }
        .tf-pill { padding: 5px 10px; border-radius: 50px; font-size: 0.75rem; cursor: pointer; transition: 0.3s; color: #555; white-space: nowrap; }
        .tf-pill.active { background: var(--primary, #1abc9c); color: white; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .tf-select { padding: 6px; border-radius: 8px; border: 1px solid #ddd; background: #fff; font-family: 'Tajawal'; cursor: pointer; width: 100%; font-size: 0.9rem; }
        .tf-btn { background: #2c3e50; color: white; border: none; padding: 0 15px; border-radius: 8px; cursor: pointer; font-weight: bold; height: 38px; display: flex; align-items: center; justify-content: center; gap: 5px; margin-top: auto; font-size: 0.9rem; white-space: nowrap; }

        .new-map-container {
            position: relative; height: 500px; width: 100%;
            border-radius: 20px; overflow: hidden; border: 4px solid #fff;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1); z-index: 1;
        }
        #mapid { height: 100%; width: 100%; }

        @media (max-width: 768px) {
            .centered-map-layout { max-width: 100%; padding: 0 10px; }
            .top-filter-bar { flex-direction: column; align-items: stretch; gap: 12px; }
            .tf-item { width: 100%; }
            .tf-pills { width: 100%; overflow-x: auto; justify-content: space-between; }
            .new-map-container { height: 480px; }
        }

        .leaflet-popup-content-wrapper { border-radius: 12px; padding: 0; overflow: hidden; }
        .leaflet-popup-content { margin: 0 !important; width: 220px !important; } 
        .popup-car-card { padding: 10px; max-height: 260px; overflow-y: auto; }
        .popup-img { width: 100%; height: 90px; object-fit: cover; border-radius: 6px; margin-bottom: 5px; }
        .popup-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .popup-header h4 { margin: 0; font-size: 0.9rem; color: #1abc9c; }
        .popup-rating { background: #fff9db; padding: 1px 6px; border-radius: 4px; font-weight: bold; color: #f39c12; font-size: 0.75rem; }
        .rating-row { display: flex; justify-content: space-between; font-size: 0.7rem; margin: 3px 0; color: #666; align-items: center; }
        .progress-bar { width: 60px; height: 4px; background: #eee; border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; background: #2ecc71; }
        .popup-btn { display: block; padding: 6px; font-size: 0.85rem; text-align: center; background: var(--primary, #1abc9c); color: white; border-radius: 6px; margin-top: 8px; text-decoration: none; }
        .leaflet-popup-close-button { font-size: 18px !important; color: #333 !important; top: 5px !important; right: 5px !important; width: 24px !important; height: 24px !important; background: rgba(255,255,255,0.9); border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        body.dark-mode .top-filter-bar { background: #2d3436; border-color: #444; }
        body.dark-mode .tf-label { color: #ccc; }
        body.dark-mode .tf-select { background: #444; color: white; border-color: #555; }
        body.dark-mode .tf-pills { background: #333; }
        body.dark-mode .tf-pill { color: #aaa; }
        body.dark-mode .tf-pill.active { background: #f1c40f; color: #000; }
        body.dark-mode .new-map-container { border-color: #444; }
        body.dark-mode #mapid .leaflet-tile-pane { filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }

        .price-marker-box {
            background: white; border-radius: 30px; padding: 4px 10px;
            font-weight: bold; font-family: 'Tajawal'; font-size: 0.8rem;
            box-shadow: 0 3px 8px rgba(0,0,0,0.2); border: 2px solid white;
            display: flex; align-items: center; gap: 4px; color: #333; transition: transform 0.2s;
        }
        .price-marker-box:hover { transform: scale(1.1); z-index: 1000; }
        .price-marker-box.premium { background: #2c3e50; color: #f1c40f; border-color: #f1c40f; }

        .loading-map {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(255,255,255,0.8); padding: 20px 30px; border-radius: 12px;
            z-index: 1000; font-weight: bold; color: #555;
            display: flex; align-items: center; gap: 10px;
        }
        body.dark-mode .loading-map { background: rgba(30,30,30,0.9); color: #ccc; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <nav class="navbar">
                <a href="index.html" class="logo"><div class="logo-icon">و</div><div class="logo-text">وُجْهَة</div></a>
                <ul class="nav-links desktop-nav-links">
                    <li><a href="index.html">الرئيسية</a></li>
                    <li><a href="cars.html">الأسطول</a></li>
                    <li><a href="qassim-map.html" class="active">تصفح الخريطة</a></li>
                    <li><a href="dashboard-owner.html" class="auth-link" id="nav-owner-dashboard">لوحة المؤجر</a></li>
                    <li><a href="dashboard-renter.html" class="auth-link" id="nav-renter-dashboard">لوحة المستأجر</a></li>
                    <li><a href="add-car.html" class="auth-link" id="nav-add-car">أضف سيارتك</a></li>
                </ul>
                <div class="nav-buttons nav-buttons-desktop-only">
                    <button id="theme-toggle-desktop" class="theme-toggle"><i class="fas fa-moon"></i> الوضع</button>
                    <a href="landing.html" class="btn btn-primary guest-only" id="nav-guest-button">دخول</a>
                    <div id="nav-user-profile-placeholder"></div>
                </div>
            </nav>
        </div>
    </header>

    <section style="padding-top: 120px; padding-bottom: 50px;">
        <div class="container">
            <div class="section-title" data-aos="fade-up">
                <h2>استكشف السيارات حولك</h2>
                <p>اختر السيارة، شيك على تقييمها، وانطلق!</p>
            </div>
            
            <div class="centered-map-layout">
                <div class="top-filter-bar" data-aos="fade-up">
                    <div class="tf-item">
                        <span class="tf-label"><i class="fas fa-map-marker-alt"></i> المدينة</span>
                        <select id="city-selector" class="tf-select" onchange="changeCity()">
                            <option value="all">جميع المدن</option>
                            <option value="الرياض">الرياض</option>
                            <option value="جدة">جدة</option>
                            <option value="الدمام">الدمام</option>
                            <option value="الخبر">الخبر</option>
                            <option value="بريدة">بريدة</option>
                        </select>
                    </div>
                    <div class="tf-item">
                        <span class="tf-label"><i class="fas fa-car"></i> الفئة</span>
                        <div class="tf-pills">
                            <div class="tf-pill active" onclick="filterMap('الكل', this)">الكل</div>
                            <div class="tf-pill" onclick="filterMap('sedan', this)">سيدان</div>
                            <div class="tf-pill" onclick="filterMap('suv', this)">عائلي</div>
                            <div class="tf-pill" onclick="filterMap('luxury', this)">فاخرة</div>
                        </div>
                    </div>
                    <div class="tf-item">
                        <span class="tf-label"><i class="fas fa-tag"></i> الحد الأقصى: <span id="priceValue" style="color:var(--primary, green);">1000</span> ريال</span>
                        <input type="range" min="50" max="1000" value="1000" style="width:100%; accent-color:var(--primary, green);" oninput="updatePriceLabel(this.value); renderCars()">
                    </div>
                    <button class="tf-btn" onclick="simulateSmartLocate()" id="smart-locate-btn"><i class="fas fa-crosshairs"></i> الأقرب</button>
                </div>

                <div class="new-map-container" data-aos="zoom-in">
                    <div id="mapid"></div>
                    <div id="loading-map-overlay" class="loading-map">
                        <i class="fas fa-spinner fa-spin"></i> جاري تحميل السيارات...
                    </div>
                </div>
            </div>
        </div>
    </section>

    <nav class="bottom-navbar mobile-bottom-navbar">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>الرئيسية</span></a>
        <a href="cars.html" class="nav-item"><i class="fas fa-car"></i><span>السيارات</span></a>
        <a href="landing.html" class="nav-item guest-only" id="mobile-bottom-guest-button"><i class="fas fa-sign-in-alt"></i><span>دخول</span></a>
        <a href="#" class="nav-item auth-link-bottom" id="mobile-bottom-user-button"><i class="fas fa-user-circle"></i><span>حسابي</span></a>
        <a href="qassim-map.html" class="nav-item active"><i class="fas fa-map-marked-alt"></i><span>الخريطة</span></a>
    </nav>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ once: true });

        // ===== متغيرات الخريطة =====
        let map, carLayer, routeLine;
        let currentCars = []; // سيتم تخزين السيارات المجلوبة من Supabase
        const centerPoint = [24.8375090, 46.7297325]; // واجهة روشن
        let currType = 'الكل';
        let maxPrice = 1000;
        let currCity = 'all';

        // ===== تحديث شريط التنقل (من script.js) =====
        function updateNavbarLocal() {
            if (typeof updateNavbarBasedOnLoginStatus === 'function') {
                updateNavbarBasedOnLoginStatus();
            }
        }

        // ===== جلب السيارات من Supabase =====
        async function fetchCarsForMap() {
            try {
                // جلب السيارات النشطة فقط
                const { data, error } = await supabase
                    .from('cars')
                    .select('*')
                    .eq('status', 'active');

                if (error) throw error;
                return data;
            } catch (err) {
                console.error('خطأ في جلب السيارات:', err);
                return [];
            }
        }

        // ===== تهيئة الخريطة =====
        async function initMap() {
            const mapContainer = document.getElementById('mapid');
            if (!mapContainer) return;

            // عرض مؤشر التحميل
            const overlay = document.getElementById('loading-map-overlay');
            overlay.style.display = 'flex';

            // جلب السيارات
            currentCars = await fetchCarsForMap();

            // إذا لم توجد سيارات، نستخدم بيانات وهمية (للاختبار)
            if (currentCars.length === 0) {
                console.warn('لا توجد سيارات نشطة، سيتم استخدام بيانات وهمية.');
                currentCars = getFallbackCars();
            }

            // إخفاء التحميل
            overlay.style.display = 'none';

            // إنشاء الخريطة
            map = L.map('mapid').setView(centerPoint, 14);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; CARTO',
                maxZoom: 20
            }).addTo(map);

            carLayer = L.layerGroup().addTo(map);
            renderCars();

            // تحديث حجم الخريطة بعد ثانية
            setTimeout(() => map.invalidateSize(), 500);

            // عند غلق البوب أب، نعيد الكاميرا
            map.on('popupclose', function() {
                map.flyTo(centerPoint, 14, { duration: 1 });
                if (routeLine) map.removeLayer(routeLine);
            });
        }

        // ===== بيانات وهمية (احتياطية) =====
        function getFallbackCars() {
            return [
                { id: 'f1', type: 'sedan', brand: 'تويوتا', model: 'كامري 2024', daily_price: 120, city: 'الرياض', lat: 24.8375, lng: 46.7297, rating: 4.9, images: ['https://tse2.mm.bing.net/th/id/OIP.F3b-M0eckL0XjmywTpu8EgHaFj?rs=1&pid=ImgDetMain&o=7&rm=3'] },
                { id: 'f2', type: 'suv', brand: 'تويوتا', model: 'لاندكروزر 2023', daily_price: 450, city: 'الرياض', lat: 24.8381, lng: 46.7292, rating: 5.0, images: ['https://www.autopediame.com/userfiles/images/%D9%84%D8%A7%D9%86%D8%AF%D9%83%D8%B1%D9%88%D8%B2%D8%B1/%D8%AA%D9%88%D9%8A%D9%88%D8%AA%D8%A7%20%D9%84%D8%A7%D9%86%D8%AF%D9%83%D8%B1%D9%88%D8%B2%D8%B1%201.jpg'] },
                { id: 'f3', type: 'luxury', brand: 'لوسيد', model: 'آير', daily_price: 700, city: 'الرياض', lat: 24.8385, lng: 46.7298, rating: 5.0, images: ['https://tse1.mm.bing.net/th/id/OIP.gH5S692_GzMVWiq6ui-sdQHaEA?cb=ucfimg2&ucfimg=1&rs=1&pid=ImgDetMain&o=7&rm=3'] }
            ];
        }

        // ===== عرض السيارات على الخريطة =====
        function renderCars() {
            if (!map || !carLayer) return;
            carLayer.clearLayers();
            if (routeLine) map.removeLayer(routeLine);

            let filtered = currentCars.filter(car => {
                const typeMatch = currType === 'الكل' ? true : car.type === currType;
                const priceMatch = (car.daily_price || 0) <= maxPrice;
                const cityMatch = currCity === 'all' ? true : car.city === currCity;
                return typeMatch && priceMatch && cityMatch;
            });

            filtered.forEach(car => {
                const lat = parseFloat(car.lat) || 24.8;
                const lng = parseFloat(car.lng) || 46.7;
                const price = car.daily_price || 0;
                const isPremium = car.rating && car.rating >= 4.8;

                const marker = L.marker([lat, lng], {
                    icon: createPriceIcon(price, car.type, isPremium)
                }).addTo(carLayer);

                marker.on('click', () => {
                    const offsetLat = lat + 0.0025;
                    map.flyTo([offsetLat, lng], 16, { duration: 1 });
                    if (routeLine) map.removeLayer(routeLine);
                    routeLine = L.polyline([centerPoint, [lat, lng]], {
                        color: '#34495e',
                        dashArray: '10, 10'
                    }).addTo(map);
                });

                const imgUrl = car.images && car.images.length > 0 ? car.images[0] : 'https://via.placeholder.com/300x200?text=سيارة';
                const content = `
                    <div class="popup-car-card">
                        <img src="${imgUrl}" class="popup-img" alt="${car.brand || ''} ${car.model || ''}">
                        <div class="popup-header">
                            <h4>${car.brand || ''} ${car.model || ''}</h4>
                            <span class="popup-rating">⭐ ${car.rating || 4.5}</span>
                        </div>
                        <div style="margin:5px 0;">
                            <div class="rating-row"><span>الميكانيكا</span><div class="progress-bar"><div class="progress-fill" style="width:${(car.rating || 4.5)*10}%"></div></div></div>
                            <div class="rating-row"><span>النظافة</span><div class="progress-bar"><div class="progress-fill" style="width:${(car.rating || 4.5)*10}%"></div></div></div>
                        </div>
                        <a href="cars.html" class="popup-btn">حجز بـ ${price} ريال</a>
                    </div>
                `;
                marker.bindPopup(content, {
                    autoPan: true,
                    autoPanPadding: [20, 20],
                    closeButton: true
                });
            });

            // إذا لم تظهر أي سيارة، نعرض رسالة
            if (filtered.length === 0) {
                L.popup()
                    .setLatLng(centerPoint)
                    .setContent('لا توجد سيارات تطابق الفلتر الحالي.')
                    .openOn(map);
            }
        }

        // ===== إنشاء أيقونة السعر =====
        function createPriceIcon(price, type, isPremium) {
            let iconHtml = '<i class="fas fa-car" style="color:#1abc9c"></i>';
            if (type === 'luxury') iconHtml = '<i class="fas fa-gem" style="color:#f1c40f"></i>';
            else if (type === 'suv') iconHtml = '<i class="fas fa-truck-pickup" style="color:#e67e22"></i>';
            return L.divIcon({
                className: 'custom-none',
                html: `<div class="price-marker-box ${isPremium ? 'premium' : ''}">${iconHtml} ${price} ﷼</div>`,
                iconSize: [80, 30],
                iconAnchor: [40, 35],
                popupAnchor: [0, -35]
            });
        }

        // ===== دوال الفلاتر =====
        window.updatePriceLabel = function(val) {
            maxPrice = parseInt(val);
            document.getElementById('priceValue').innerText = maxPrice;
            renderCars();
        };

        window.filterMap = function(type, el) {
            currType = type;
            document.querySelectorAll('.tf-pill').forEach(p => p.classList.remove('active'));
            el.classList.add('active');
            renderCars();
        };

        window.changeCity = function() {
            const select = document.getElementById('city-selector');
            currCity = select.value;
            renderCars();
        };

        window.simulateSmartLocate = function() {
            if (map) map.flyTo(centerPoint, 16);
        };

        // ===== تهيئة الصفحة =====
        document.addEventListener('DOMContentLoaded', function() {
            // تحديث شريط التنقل
            updateNavbarLocal();

            // تهيئة الثيم
            const themeBtn = document.getElementById('theme-toggle-desktop');
            if (themeBtn) {
                if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');
                themeBtn.addEventListener('click', () => {
                    document.body.classList.toggle('dark-mode');
                    localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
                });
            }

            // تشغيل الخريطة
            initMap();
        });
    </script>
</body>
</html>
