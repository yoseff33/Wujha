<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وُجْهَة | النطاق التقريبي للسيارة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="script.js" defer></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; }
        #map { height: 100vh; width: 100%; }
        .info-overlay {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--color-card);
            padding: var(--spacing-3) var(--spacing-6);
            border-radius: var(--radius-full);
            box-shadow: var(--shadow-lg);
            z-index: 1000;
            font-weight: var(--font-weight-bold);
            color: var(--color-heading);
            text-align: center;
            max-width: 90%;
            border: 1px solid var(--color-border);
            display: flex;
            align-items: center;
            gap: var(--spacing-2);
        }
        .info-overlay i { color: var(--color-secondary); font-size: 1.2rem; }
        .back-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1001;
            background: var(--color-card);
            border: 1px solid var(--color-border);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            color: var(--color-text);
            transition: all var(--transition-fast);
        }
        .back-btn:hover { background: var(--color-bg-secondary); }
        .loading-spinner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 999;
            font-size: 1.2rem;
            color: var(--color-text-secondary);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--spacing-2);
        }
        .loading-spinner i { font-size: 2.5rem; color: var(--color-secondary); animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="info-overlay">
        <i class="fas fa-map-pin"></i>
        <span>السيارة موجودة ضمن <strong>النطاق التقريبي</strong> الموضح بالدائرة، وسيظهر الموقع الدقيق بعد تأكيد الحجز.</span>
    </div>
    <button class="back-btn" onclick="window.close()"><i class="fas fa-times"></i></button>
    <div class="loading-spinner" id="loadingSpinner">
        <i class="fas fa-spinner"></i>
        <span>جاري تحميل موقع السيارة...</span>
    </div>

    <script>
        (async function initPreview() {
            const params = new URLSearchParams(window.location.search);
            const carId = params.get('carId');
            if (!carId) { alert('❌ لم يتم تحديد السيارة'); window.close(); return; }

            try {
                const { data: car, error } = await window.supabaseClient
                    .from('cars')
                    .select('latitude, longitude, geofence_radius, brand, model')
                    .eq('id', carId)
                    .single();
                if (error || !car || !car.latitude || !car.longitude) {
                    alert('❌ لم يقم المالك بتحديد موقع السيارة بعد');
                    window.close();
                    return;
                }

                document.getElementById('loadingSpinner').style.display = 'none';
                const center = [car.latitude, car.longitude];
                const radius = car.geofence_radius || 500;

                const map = L.map('map').setView(center, 13);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                    attribution: '&copy; CARTO',
                    maxZoom: 20
                }).addTo(map);

                L.circle(center, {
                    color: '#c5a065',
                    fillColor: '#c5a065',
                    fillOpacity: 0.08,
                    radius: radius,
                    dashArray: '8, 6',
                    weight: 2.5,
                    opacity: 0.7
                }).addTo(map);

                const markerIcon = L.divIcon({
                    className: 'custom-car-marker',
                    html: `<div style="background:white;border-radius:50%;padding:8px;box-shadow:0 4px 16px rgba(0,0,0,0.2);border:2px solid #c5a065;">
                            <i class="fas fa-car" style="color:#c5a065;font-size:28px;"></i>
                          </div>`,
                    iconSize: [48, 48],
                    iconAnchor: [24, 48],
                    popupAnchor: [0, -48]
                });
                L.marker(center, { icon: markerIcon, interactive: false })
                    .addTo(map)
                    .bindPopup(`<div style="text-align:center;"><strong>${car.brand || ''} ${car.model || ''}</strong><br><span style="color:#94a3b8;font-size:0.8rem;">النطاق التقريبي</span></div>`)
                    .openPopup();

                setTimeout(() => map.invalidateSize(), 300);
            } catch (err) {
                alert('❌ حدث خطأ غير متوقع');
                window.close();
            }
        })();
    </script>
</body>
</html>
