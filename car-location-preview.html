<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وُجْهَة | النطاق التقريبي للسيارة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="script.js" defer></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; }
        #map { height: 100vh; width: 100%; }
        .info-overlay {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--color-card);
            padding: var(--spacing-3) var(--spacing-6);
            border-radius: var(--radius-full);
            box-shadow: var(--shadow-lg);
            z-index: 1000;
            font-weight: var(--font-weight-bold);
            color: var(--color-heading);
            text-align: center;
            max-width: 90%;
            border: 1px solid var(--color-border);
            display: flex;
            align-items: center;
            gap: var(--spacing-2);
        }
        .info-overlay i { color: var(--color-secondary); font-size: 1.2rem; }
        .back-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1001;
            background: var(--color-card);
            border: 1px solid var(--color-border);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            color: var(--color-text);
            transition: all var(--transition-fast);
        }
        .back-btn:hover { background: var(--color-bg-secondary); }
        .loading-spinner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 999;
            font-size: 1.2rem;
            color: var(--color-text-secondary);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--spacing-2);
        }
        .loading-spinner i { font-size: 2.5rem; color: var(--color-secondary); animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        /* زر تبديل الطبقات */
        .layer-switch {
            position: absolute;
            bottom: 100px;
            left: 10px;
            z-index: 1000;
            background: var(--color-card);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-md);
            padding: var(--spacing-2);
            display: flex;
            flex-direction: column;
            gap: var(--spacing-1);
            border: 1px solid var(--color-border);
        }
        .layer-switch button {
            padding: var(--spacing-1) var(--spacing-3);
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-family: var(--font-family);
            font-size: var(--font-size-xs);
            font-weight: var(--font-weight-bold);
            background: var(--color-bg-secondary);
            color: var(--color-text-secondary);
            transition: all var(--transition-fast);
            white-space: nowrap;
        }
        .layer-switch button.active {
            background: var(--color-secondary);
            color: var(--color-primary-dark);
        }
        .layer-switch button:hover { transform: scale(1.05); }
        @media (max-width: 480px) {
            .layer-switch { flex-direction: row; bottom: 80px; left: 50%; transform: translateX(-50%); }
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="info-overlay">
        <i class="fas fa-map-pin"></i>
        <span>السيارة موجودة ضمن <strong>النطاق التقريبي</strong> الموضح بالدائرة، وسيظهر الموقع الدقيق بعد تأكيد الحجز.</span>
    </div>
    <button class="back-btn" onclick="window.close()"><i class="fas fa-times"></i></button>
    <div class="loading-spinner" id="loadingSpinner">
        <i class="fas fa-spinner"></i>
        <span>جاري تحميل موقع السيارة...</span>
    </div>
    <!-- زر تبديل الطبقات -->
    <div class="layer-switch" id="layerSwitch">
        <button class="active" data-layer="carto">شارع</button>
        <button data-layer="satellite">قمر صناعي</button>
        <button data-layer="topo">تضاريس</button>
    </div>

    <script>
        const LAYERS = {
            carto: L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '© CartoDB',
                maxZoom: 20
            }),
            satellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                attribution: '© Esri',
                maxZoom: 19
            }),
            topo: L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenTopoMap',
                maxZoom: 17
            })
        };
        let map, currentLayer = 'carto';

        (async function initPreview() {
            const params = new URLSearchParams(window.location.search);
            const carId = params.get('carId');
            if (!carId) { alert('❌ لم يتم تحديد السيارة'); window.close(); return; }

            try {
                const { data: car, error } = await window.supabaseClient
                    .from('cars')
                    .select('latitude, longitude, geofence_radius, brand, model')
                    .eq('id', carId)
                    .single();
                if (error || !car || !car.latitude || !car.longitude) {
                    alert('❌ لم يقم المالك بتحديد موقع السيارة بعد');
                    window.close();
                    return;
                }

                document.getElementById('loadingSpinner').style.display = 'none';
                const center = [car.latitude, car.longitude];
                const radius = car.geofence_radius || 500;

                map = L.map('map').setView(center, 13);
                LAYERS.carto.addTo(map);

                // دائرة النطاق
                L.circle(center, {
                    color: '#c5a065',
                    fillColor: '#c5a065',
                    fillOpacity: 0.08,
                    radius: radius,
                    dashArray: '8, 6',
                    weight: 2.5,
                    opacity: 0.7
                }).addTo(map);

                // أيقونة سيارة محسنة
                const markerIcon = L.divIcon({
                    className: 'custom-car-marker',
                    html: `<div style="background:white;border-radius:50%;padding:10px;box-shadow:0 4px 16px rgba(0,0,0,0.2);border:2px solid #c5a065;">
                            <i class="fas fa-car" style="color:#c5a065;font-size:28px;"></i>
                          </div>`,
                    iconSize: [52, 52],
                    iconAnchor: [26, 52],
                    popupAnchor: [0, -52]
                });
                L.marker(center, { icon: markerIcon, interactive: false })
                    .addTo(map)
                    .bindPopup(`<div style="text-align:center;"><strong>${car.brand || ''} ${car.model || ''}</strong><br><span style="color:#94a3b8;font-size:0.8rem;">النطاق التقريبي</span></div>`)
                    .openPopup();

                // زر تبديل الطبقات
                document.querySelectorAll('#layerSwitch button').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const layer = this.dataset.layer;
                        if (layer === currentLayer) return;
                        map.removeLayer(LAYERS[currentLayer]);
                        LAYERS[layer].addTo(map);
                        currentLayer = layer;
                        document.querySelectorAll('#layerSwitch button').forEach(b => b.classList.remove('active'));
                        this.classList.add('active');
                    });
                });

                setTimeout(() => map.invalidateSize(), 300);
            } catch (err) {
                alert('❌ حدث خطأ غير متوقع');
                window.close();
            }
        })();
    </script>
</body>
</html>
