    <style>

        /* قواعد الطباعة */
        @media print {
            @page { size: A4; margin: 0; }
            body { background: white !important; color: black !important; font-size: 10.5pt !important; line-height: 1.7 !important; margin: 0; padding: 0; }
            .no-print { display: none !important; }

            .contract-cover-front {
                page-break-after: always;
                border: none;

            .contract-cover-back {

            thead { display: table-header-group; }
            .live-input-blank { border-bottom: 1px dotted #555 !important; background-color: transparent !important; padding: 0 2px !important; font-weight: 600 !important; color: #000 !important; min-width: auto !important; display: inline !important; outline: none !important; box-shadow: none !important; }
            .print-logo { display: block !important; text-align: center; margin-bottom: 18px; }
            #printable-contract-area { padding: 0 !important; }
        }

        @media screen {
            .live-input-blank { border-bottom: 2px dashed #cbd5e1; background-color: #f8fafc; transition: all 0.2s; padding: 0 5px; font-weight: 600; color: #0f172a; min-width: 60px; display: inline-block; outline: none; border-radius: 2px; white-space: nowrap; }
            .live-input-blank:focus { background-color: #fef3c7; border-bottom-color: #a67c1e; box-shadow: 0 2px 4px rgba(166,124,30,0.15); white-space: normal; }
        }
        .print-logo { display: none; }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.55); z-index: 9999; display: flex; justify-content: center; align-items: center; flex-direction: column; color: white; font-size: 1.2rem; gap: 1rem; }
        .spinner { border: 4px solid rgba(255,255,255,0.3); border-top: 4px solid white; border-radius: 50%; width: 44px; height: 44px; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #0f2c1f; color: white; padding: 12px 28px; border-radius: 10px; z-index: 10000; font-weight: bold; font-size: 0.95rem; box-shadow: 0 6px 20px rgba(0,0,0,0.2); animation: fadeInOut 3s ease forwards; pointer-events: none; }
        @keyframes fadeInOut { 0% { opacity: 0; bottom: 10px; } 10% { opacity: 1; bottom: 24px; } 90% { opacity: 1; bottom: 24px; } 100% { opacity: 0; bottom: 10px; } }
        .field-error { border-color: #e53e3e !important; background-color: #fff5f5 !important; }
        table { border-collapse: collapse; width: 100%; }
        #contract-body p { margin-bottom: 0.35rem; }
        #contract-body h3 { margin-top: 1.2rem; margin-bottom: 0.5rem; }
    </style>

<div id="loading-overlay" class="loading-overlay" style="display: none;"><div class="spinner"></div><span id="loading-text">جارٍ التجهيز...</span></div>

<script>
    (function() {
        const LOGO_URL = 'https://via.placeholder.com/150x80.png?text=شعار+فزاع';
        const STORAGE_KEY = 'fazza_contract_data_v7';

        const EMPTY_AGENT_DATA = {
            agent_name: '', agent_nationality: '', agent_id: '', agent_id_source: '', agent_id_date: '',
            agent_address: '', agent_email: '', agent_phone: '', agent_bank: '', agent_iban: ''
        };

        const EMPTY_INVESTOR_DATA = {
            investor_name: '', investor_nationality: '', investor_id: '', investor_id_source: '',
            investor_id_date: '', investor_address: '', investor_email: '', investor_phone: '',
            investor_bank: '', investor_iban: ''
        };

        const defaultData = {
            contract_day: 'الأربعاء', contract_date_g: '16/07/2026', contract_date_h: '02/02/1448', contract_city: 'الرياض',
            agent_name: 'سليمان بن عبد الله الحربي', agent_nationality: 'سعودي', agent_id: '1029384756', agent_id_source: 'الأحوال المدنية بالرياض', agent_id_date: '15/08/1442هـ',
            agent_address: 'الرياض، حي الياسمين، 11564', agent_email: 'ceo@fazza.sa', agent_phone: '0555123456', agent_bank: 'مصرف الراجحي', agent_iban: 'SA8980000123456789012345',
            investor_name: 'شركة الرواد العالمية للاستثمار', investor_nationality: 'سعودية', investor_id: '1010394857', investor_id_source: 'وزارة التجارة بالرياض', investor_id_date: '10/01/1445هـ',
            investor_address: 'الرياض، حي السليمانية، مبنى 4492', investor_email: 'investor@alruwad.com', investor_phone: '0500123456', investor_bank: 'البنك الأهلي', investor_iban: 'SA4310000098765432109876',
            duration: 'سنة واحدة', start_date: '16/07/2026', maturity_date: '16/07/2027', capital_num: '100,000', capital_words: 'مائة ألف ريال لا غير',
            court_city: 'الرياض', dispute_method: 'court', payout_period: 'monthly'
        };

        let currentData = { ...defaultData };
        let isExporting = false;
        const contractBody = document.getElementById('contract-body');
        const dynamicControls = document.getElementById('dynamic-controls');
        const loadingOverlay = document.getElementById('loading-overlay');
        const loadingText = document.getElementById('loading-text');

        function showToast(msg, err = false) {
            document.querySelectorAll('.toast').forEach(t => t.remove());
            const t = document.createElement('div'); t.className = 'toast'; t.style.background = err ? '#c53030' : '#0f2c1f'; t.textContent = msg;
            document.body.appendChild(t); setTimeout(() => t.remove(), 3000);
        }
        function showLoading(txt) { loadingText.textContent = txt; loadingOverlay.style.display = 'flex'; }
        function hideLoading() { loadingOverlay.style.display = 'none'; }

        function validateField(fid, val) {
            const el = document.getElementById(`ctrl_${fid}`); if (!el) return true;
            el.classList.remove('field-error'); const v = val.trim(); if (v === '') return true;
            let ok = true;
            switch (fid) {
                case 'agent_id': case 'investor_id': ok = /^[0-9]{10}$/.test(v); break;
                case 'agent_email': case 'investor_email': ok = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); break;
                case 'agent_phone': case 'investor_phone': ok = /^0[0-9]{9}$/.test(v); break;
                case 'agent_iban': case 'investor_iban': ok = /^SA[0-9]{22}$/.test(v.toUpperCase()); break;
                case 'capital_num': ok = /^[0-9,]+$/.test(v); break;
            }
            if (!ok) el.classList.add('field-error');
            return ok;
        }

        function formatNum(v) { const n = v.replace(/[^0-9]/g, ''); return n === '' ? '' : Number(n).toLocaleString('en-US'); }

        function syncAllViews(fid, val) {
            const clean = val.trim() === '' ? '............' : val;
            document.querySelectorAll(`[data-field="${fid}"]`).forEach(el => { el.innerText = clean; });
            const tbl = document.getElementById(`tbl_${fid}`); if (tbl) tbl.innerText = clean;
            const sig = document.getElementById(`sig_${fid}`); if (sig) sig.innerText = clean;
            if (fid === 'court_city') { const c2 = document.getElementById('court_city_2'); if (c2) c2.innerText = clean; }
            // تحديث الغلاف
            const coverEl = document.getElementById(`cover_${fid}`); if (coverEl) coverEl.innerText = clean;
        }

        function updateCtrl(fid, val) { const c = document.getElementById(`ctrl_${fid}`); if (c) c.value = val; syncAllViews(fid, val); autoSave(); }

        function handleFieldInput(e) {
            const fid = e.target.dataset.field; if (!fid) return;
            let val = e.target.innerText || e.target.value;
            if (fid === 'capital_num') { val = formatNum(val); e.target.innerText = val; }
            validateField(fid, val); updateCtrl(fid, val);
        }

        function handleControlInput(e) {
            const fid = e.target.id.replace('ctrl_', ''); let val = e.target.value;
            if (fid === 'capital_num') { val = formatNum(val); e.target.value = val; }
            validateField(fid, val); syncAllViews(fid, val); autoSave();
        }

        function updateDisputeUI() {
            document.getElementById('dispute_court').checked = currentData.dispute_method === 'court';
            document.getElementById('dispute_arbitration').checked = currentData.dispute_method === 'arbitration';
        }

        function updatePayoutUI() {
            const map = { monthly: 'شهري (نهاية كل شهر)', quarterly: 'ربع سنوي', thirdly: 'ثلث سنوي (كل 4 أشهر)', yearly: 'سنوي' };
            const p = document.getElementById('tbl_payout_period'); if (p) p.innerText = map[currentData.payout_period] || currentData.payout_period;
        }

        function autoSave() {
            try {
                document.querySelectorAll('#dynamic-controls input, #dynamic-controls select').forEach(ctrl => {
                    const fid = ctrl.id.replace('ctrl_', '');
                    if (fid && currentData.hasOwnProperty(fid)) currentData[fid] = ctrl.value;
                });
                localStorage.setItem(STORAGE_KEY, JSON.stringify(currentData));
            } catch (e) {}
        }

        function loadSavedData() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) currentData = { ...defaultData, ...JSON.parse(saved) };
            } catch (e) { currentData = { ...defaultData }; }
        }

        function clearAgentData() {
            Object.keys(EMPTY_AGENT_DATA).forEach(k => { currentData[k] = ''; });
            Object.keys(EMPTY_AGENT_DATA).forEach(k => {
                const ctrl = document.getElementById(`ctrl_${k}`); if (ctrl) ctrl.value = '';
                syncAllViews(k, '');
            });
            buildContractBody(); bindContentEditableEvents();
            Object.keys(currentData).forEach(k => {
                if (!EMPTY_AGENT_DATA.hasOwnProperty(k)) syncAllViews(k, currentData[k]);
            });
            localStorage.removeItem(STORAGE_KEY); autoSave();
            showToast('✅ تم مسح جميع بيانات المدير (الطرف الأول) بنجاح');
        }

        function clearInvestorData() {
            Object.keys(EMPTY_INVESTOR_DATA).forEach(k => { currentData[k] = ''; });
            Object.keys(EMPTY_INVESTOR_DATA).forEach(k => {
                const ctrl = document.getElementById(`ctrl_${k}`); if (ctrl) ctrl.value = '';
                syncAllViews(k, '');
            });
            buildContractBody(); bindContentEditableEvents();
            Object.keys(currentData).forEach(k => {
                if (!EMPTY_INVESTOR_DATA.hasOwnProperty(k)) syncAllViews(k, currentData[k]);
            });
            localStorage.removeItem(STORAGE_KEY); autoSave();
